name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve Pages URL
        id: pages
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER}"
          repo="${GITHUB_REPOSITORY#*/}"
          if [[ "${repo}" == "${owner}.github.io" ]]; then
            echo "site=https://${owner}.github.io" >> "$GITHUB_OUTPUT"
            echo "base=/" >> "$GITHUB_OUTPUT"
          else
            echo "site=https://${owner}.github.io" >> "$GITHUB_OUTPUT"
            echo "base=/${repo}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install, build, and upload
        uses: withastro/action@v6
        with:
          node-version: 22
          package-manager: pnpm@9.14.4
          build-cmd: pnpm run build
        env:
          ASTRO_SITE: ${{ steps.pages.outputs.site }}
          ASTRO_BASE: ${{ steps.pages.outputs.base }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
